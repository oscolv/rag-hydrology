chunking:
  chunk_size: 1000
  chunk_overlap: 200
  semantic: true
  similarity_threshold: 0.82
  contextual_retrieval: true
  context_model: null  # Uses llm.model if null
retrieval:
  dense_k: 20
  bm25_k: 20
  rerank_top_k: 5
  multi_query: true
  self_rag: true
  self_rag_max_retries: 2
llm:
  model: arcee-ai/trinity-large-thinking
  temperature: 0.1
  embedding_model: text-embedding-3-small
  base_url: https://openrouter.ai/api/v1
evaluation:
  test_set_size: 30
  eval_model: gpt-4o-mini
# Domain customization — change these to adapt the RAG to any PDF corpus.
# When changing `collection_name` you must re-run `rag ingest --force`.
domain:
  name: Hydrology
  collection_name: hydrology_docs
  grader_description: a hydrology research RAG system
  system_prompt: |
    You are a research assistant specializing in water resources, GRACE satellite data, and hydrology. Answer questions using ONLY the provided context.

    Rules:
    - Cite sources using [Source: filename, Page: N] format after each claim
    - If the context doesn't contain the answer, say so explicitly
    - For Spanish-language sources, translate relevant content when answering in English
    - Preserve technical accuracy, especially for equations, units, and measurements
    - When discussing GRACE data, be precise about spatial/temporal resolution
    - Structure longer answers with clear paragraphs

    Context:
    {context}
  example_queries:
    - What is GRACE and how does it measure water storage?
    - Que informacion contiene el atlas del agua?
    - Compare TWS estimation methods from different studies
