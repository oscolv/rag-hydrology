# Self-hosted Langfuse v3 stack — opt-in observability for the RAG pipeline.
#
# This file is INTENTIONALLY separate from docker-compose.yml so the main RAG
# container stays lean. Use it only if you don't want to send traces to
# cloud.langfuse.com.
#
# Quick start:
#
#     # 1. Generate the secrets the stack needs (run each on the host):
#     openssl rand -hex 32                      # NEXTAUTH_SECRET
#     openssl rand -hex 32                      # SALT
#     openssl rand -hex 32                      # ENCRYPTION_KEY (must be 64-char hex)
#     openssl rand -base64 32                   # CLICKHOUSE_PASSWORD / DB password
#
#     # 2. Put them (and your chosen DB passwords) in a .env.langfuse file:
#     #    NEXTAUTH_SECRET=...
#     #    SALT=...
#     #    ENCRYPTION_KEY=...
#     #    POSTGRES_PASSWORD=...
#     #    CLICKHOUSE_PASSWORD=...
#     #    REDIS_PASSWORD=...
#     #    MINIO_ROOT_PASSWORD=...
#     #    LANGFUSE_INIT_USER_EMAIL=you@example.com
#     #    LANGFUSE_INIT_USER_PASSWORD=changeme   # used to create the first admin
#
#     # 3. Boot:
#     docker compose --env-file .env.langfuse -f docker-compose.langfuse.yml up -d
#
#     # 4. Open http://localhost:3000, sign in with the init credentials, create
#     #    a project, copy its public/secret keys into the RAG .env:
#     #        LANGFUSE_PUBLIC_KEY=pk-lf-...
#     #        LANGFUSE_SECRET_KEY=sk-lf-...
#     #        LANGFUSE_HOST=http://localhost:3000

services:

  langfuse-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env.langfuse}
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - langfuse_clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.langfuse}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env.langfuse}
    volumes:
      - langfuse_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      langfuse-postgres: { condition: service_healthy }
      langfuse-clickhouse: { condition: service_healthy }
      langfuse-redis: { condition: service_healthy }
      langfuse-minio: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://langfuse:${POSTGRES_PASSWORD}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      SALT: ${SALT:?set SALT in .env.langfuse}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY (64 hex chars) in .env.langfuse}
      TELEMETRY_ENABLED: "true"

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      langfuse-worker: { condition: service_started }
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${POSTGRES_PASSWORD}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env.langfuse}
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@example.com}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-changeme}
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_ORG_NAME: Local
      LANGFUSE_INIT_PROJECT_NAME: rag
      TELEMETRY_ENABLED: "true"

volumes:
  langfuse_postgres:
  langfuse_clickhouse:
  langfuse_minio:
