services:
  rag:
    build: .
    image: rag-assistant:1.0.0
    container_name: rag
    ports:
      - "8765:8765"
    volumes:
      - ./docs:/app/docs
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
